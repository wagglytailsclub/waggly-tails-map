<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waggly Tails — The Map</title>

<script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  width:100%;
  font-family:Arial,sans-serif;
}

#map {
  position:absolute;
  top:110px;
  left:0;
  right:0;
  bottom:0;
}

#header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  background:#1a3a5c;
  color:white;
  padding:10px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
}

.header-top {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.h-paw {
  font-size:22px;
}

.h-title {
  font-size:17px;
  font-family:Georgia,serif;
}

.h-sub {
  color:#b9d1e8;
  font-size:11px;
  margin-left:auto;
}

.h-pill {
  background:#e8a020;
  color:#fff;
  font-size:11px;
  font-weight:bold;
  border-radius:12px;
  padding:4px 10px;
}

#controls {
  display:flex;
  gap:6px;
  overflow-x:auto;
}

#searchBox {
  min-width:170px;
  border:none;
  border-radius:14px;
  padding:7px 11px;
  font-size:12px;
}

button.filter-btn {
  border:none;
  border-radius:14px;
  padding:7px 11px;
  font-size:12px;
  cursor:pointer;
  background:#fff;
  color:#1a3a5c;
  white-space:nowrap;
}

button.filter-btn.active {
  background:#e8a020;
  color:#fff;
}

.paw-marker {
  width:38px;
  height:38px;
  cursor:pointer;
  transition:all .2s ease;
}

.paw-marker img {
  width:38px;
  height:38px;
  display:block;
}

.paw-marker:hover {
  transform:scale(1.2);
}

.paw-featured {
  filter:drop-shadow(0 0 6px gold);
}

.wt-popup {
  font-family:Arial,sans-serif;
  width:250px;
}

.p-name {
  font-size:16px;
  font-weight:bold;
  color:#1a3a5c;
  margin-bottom:3px;
}

.p-type {
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}

.p-reward {
  background:#e8f4f0;
  border:1px solid #7ecfb5;
  border-radius:8px;
  padding:9px 10px;
  margin-bottom:9px;
}

.p-reward b {
  display:block;
  color:#1a6b50;
  font-size:13px;
  margin-bottom:3px;
}

.p-reward span {
  color:#2a8060;
  font-size:13px;
}

.p-links a {
  display:block;
  background:#1a3a5c;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:8px;
  padding:8px;
  font-size:12px;
  margin-top:6px;
}

.p-badge {
  font-size:11px;
  background:#fff4e0;
  border:1px solid #e8c96c;
  border-radius:6px;
  padding:6px 8px;
  color:#8a5c00;
  margin-top:8px;
}

.maplibregl-popup-content {
  border-radius:12px !important;
  box-shadow:0 4px 16px rgba(0,0,0,0.18) !important;
  border:1px solid #d0c8b0 !important;
  padding:16px !important;
}

#debug {
  position:fixed;
  right:12px;
  bottom:12px;
  z-index:200;
  background:white;
  color:#1a3a5c;
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px 10px;
  font-size:11px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

@media(max-width:700px) {
  #map { top:126px; }
  .h-sub { display:none; }
}
</style>
</head>

<body>

<div id="header">
  <div class="header-top">
    <span class="h-paw">🐾</span>
    <span class="h-title">Waggly Tails — The Map</span>
    <span class="h-sub">Discover pet-friendly rewards</span>
    <span class="h-pill" id="venueCount">Loading...</span>
  </div>

  <div id="controls">
    <input id="searchBox" type="text" placeholder="Search venues...">
    <button class="filter-btn active" data-filter="All">All</button>
    <button class="filter-btn" data-filter="Cafe">Cafes</button>
    <button class="filter-btn" data-filter="Restaurant">Restaurants</button>
    <button class="filter-btn" data-filter="Shop">Shops</button>
    <button class="filter-btn" data-filter="Accommodation">Accommodation</button>
    <button class="filter-btn" data-filter="Featured">Featured</button>
    <button class="filter-btn" id="nearMeBtn">Near Me</button>
  </div>
</div>

<div id="map"></div>
<div id="debug">Loading sheet...</div>

<script>
const SHEET_ID = "1uZBCC_1X-zdLeyW10Bw_E5N63fToD-dv3PcwjfhQHX4";
const SHEET_NAME = "Sheet1";

let venues = [];
let markers = [];
let activeFilter = "All";
let searchTerm = "";
let userLocationMarker = null;

const map = new maplibregl.Map({
  container: "map",
  style: "https://api.protomaps.com/styles/v4/light/en.json?key=d8a0fbbaf70fb776",
  center: [-0.1450, 50.8270],
  zoom: 12,
  minZoom: 5,
  maxZoom: 19,
  attributionControl: true
});

map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");

function clean(value) {
  return value == null ? "" : String(value).trim();
}

function isYes(value) {
  return ["yes", "true", "1", "y"].includes(clean(value).toLowerCase());
}

function setDebug(text) {
  document.getElementById("debug").textContent = text;
}

function loadGoogleSheet() {
  const oldScript = document.getElementById("sheetScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "sheetScript";
  script.src =
    "https://docs.google.com/spreadsheets/d/" +
    SHEET_ID +
    "/gviz/tq?sheet=" +
    encodeURIComponent(SHEET_NAME) +
    "&tqx=responseHandler:handleSheetResponse&cachebust=" +
    Date.now();

  script.onerror = function() {
    setDebug("Sheet script failed to load");
    document.getElementById("venueCount").textContent = "Sheet error";
  };

  document.body.appendChild(script);
}

window.handleSheetResponse = function(response) {
  try {
    const table = response.table;
    const headers = table.cols.map(col => clean(col.label));
    const rows = table.rows || [];

    const allRows = rows.map(row => {
      const obj = {};
      headers.forEach((header, index) => {
        const cell = row.c[index];
        obj[header] = cell ? clean(cell.v) : "";
      });
      return obj;
    });

    venues = allRows
      .map(normaliseVenue)
      .filter(v =>
        v.name &&
        v.status.toLowerCase() === "live" &&
        !v.webOnly &&
        !isNaN(v.lat) &&
        !isNaN(v.lng)
      );

    setDebug("Loaded rows: " + allRows.length + " | Live venues: " + venues.length);
    renderMarkers();

  } catch (error) {
    console.error(error);
    setDebug("Sheet parse error");
    document.getElementById("venueCount").textContent = "Sheet error";
  }
};

function normaliseVenue(row) {
  return {
    name: clean(row.Name),
    type: clean(row.Type),
    area: clean(row.Area),
    address: clean(row.Address),
    lat: parseFloat(row.Latitude),
    lng: parseFloat(row.Longitude),
    reward: clean(row.Reward),
    website: clean(row.Website),
    instagram: clean(row.Instagram),
    featured: isYes(row.Featured),
    webOnly: isYes(row["Web Only"]),
    status: clean(row.Status)
  };
}

function getFilteredVenues() {
  return venues.filter(v => {
    const text = `${v.name} ${v.type} ${v.area} ${v.address}`.toLowerCase();
    const matchesSearch = text.includes(searchTerm);

    const matchesFilter =
      activeFilter === "All" ||
      v.type.toLowerCase().includes(activeFilter.toLowerCase()) ||
      (activeFilter === "Featured" && v.featured);

    return matchesSearch && matchesFilter;
  });
}

function renderMarkers() {
  markers.forEach(marker => marker.remove());
  markers = [];

  const visibleVenues = getFilteredVenues();

  visibleVenues.forEach(v => {
    const el = document.createElement("div");

    el.className =
      "paw-marker " +
      (v.featured ? "paw-featured" : "paw-standard");

    if (v.featured) {
      el.innerHTML = '<img src="./gold-paw.png" alt="Featured Waggly Tails venue" onerror="this.outerHTML=\'🐾\';">';
    } else {
      el.innerHTML = '<img src="./blue-paw.png" alt="Waggly Tails venue" onerror="this.outerHTML=\'🐾\';">';
    }

    const popup = new maplibregl.Popup({ offset: 25, maxWidth: "280px" })
      .setHTML(createPopupHTML(v));

    const marker = new maplibregl.Marker({
      element: el,
      anchor: "center"
    })
    .setLngLat([v.lng, v.lat])
    .setPopup(popup)
    .addTo(map);

    markers.push(marker);
  });

  document.getElementById("venueCount").textContent =
    markers.length + " venues live";

  if (visibleVenues.length > 0) {
    const bounds = new maplibregl.LngLatBounds();

    visibleVenues.forEach(v => {
      bounds.extend([v.lng, v.lat]);
    });

    map.fitBounds(bounds, {
      padding: 80,
      maxZoom: 14
    });
  }
}

function createPopupHTML(v) {
  const websiteLink = v.website
    ? `<a href="${escapeHTML(v.website)}" target="_blank" rel="noopener">Visit Venue Website</a>`
    : "";

  const instagramLink = v.instagram
    ? `<a href="${escapeHTML(v.instagram)}" target="_blank" rel="noopener">View Instagram</a>`
    : "";

  const badge = v.featured
    ? `<div class="p-badge">⭐ Featured Waggly Tails venue</div>`
    : `<div class="p-badge">📍 Listed Waggly Tails venue</div>`;

  return `
    <div class="wt-popup">
      <div class="p-name">${escapeHTML(v.name)}</div>
      <div class="p-type">${escapeHTML(v.type)}${v.area ? " — " + escapeHTML(v.area) : ""}</div>

      <div class="p-reward">
        <b>Reward</b>
        <span>${escapeHTML(v.reward || "Venue discount / offer to confirm")}</span>
      </div>

      <div class="p-links">
        ${websiteLink}
        ${instagramLink}
      </div>

      ${badge}
    </div>
  `;
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

document.querySelectorAll(".filter-btn[data-filter]").forEach(button => {
  button.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
    this.classList.add("active");
    activeFilter = this.dataset.filter;
    renderMarkers();
  });
});

document.getElementById("searchBox").addEventListener("input", function() {
  searchTerm = this.value.toLowerCase().trim();
  renderMarkers();
});

document.getElementById("nearMeBtn").addEventListener("click", function() {
  if (!navigator.geolocation) {
    alert("Your browser does not support location.");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    const userLng = position.coords.longitude;
    const userLat = position.coords.latitude;

    map.flyTo({
      center: [userLng, userLat],
      zoom: 15
    });

    if (userLocationMarker) userLocationMarker.remove();

    userLocationMarker = new maplibregl.Marker({ color:"#e8a020" })
      .setLngLat([userLng, userLat])
      .setPopup(new maplibregl.Popup().setHTML("<b>You are here</b>"))
      .addTo(map);
  });
});

map.on("load", function() {
  loadGoogleSheet();
  setTimeout(() => map.resize(), 500);
});

window.addEventListener("resize", () => map.resize());
</script>

</body>
</html>
