<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waggly Tails — The Map</title>

<script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; width:100%; font-family:Arial,sans-serif; }
#map { position:absolute; top:110px; left:0; right:0; bottom:0; }

#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:#1a3a5c; color:white; padding:10px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
}

.header-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.h-paw { font-size:22px; }
.h-title { font-size:17px; font-family:Georgia,serif; }
.h-sub { color:#b9d1e8; font-size:11px; margin-left:auto; }
.h-pill { background:#e8a020; color:#fff; font-size:11px; font-weight:bold; border-radius:12px; padding:4px 10px; }

#controls { display:flex; gap:6px; overflow-x:auto; }
#searchBox { min-width:170px; border:none; border-radius:14px; padding:7px 11px; font-size:12px; }

button.filter-btn {
  border:none; border-radius:14px; padding:7px 11px; font-size:12px;
  cursor:pointer; background:#fff; color:#1a3a5c; white-space:nowrap;
}
button.filter-btn.active { background:#e8a020; color:#fff; }

.pin-el {
  width:38px; height:38px; border-radius:50%; border:3px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
  display:flex; align-items:center; justify-content:center;
  font-size:19px; cursor:pointer; transition:transform 0.15s; position:relative;
}
.pin-el:hover { transform:scale(1.18); }
.pin-standard { background:#3d8bbd; }
.pin-featured { background:#1a3a5c; }

.pin-star {
  position:absolute; top:-5px; right:-5px; width:16px; height:16px;
  background:#e8a020; border-radius:50%; border:2px solid #fff;
  font-size:10px; line-height:13px; text-align:center; color:#fff; font-weight:bold;
}

.wt-popup { font-family:Arial,sans-serif; width:250px; }
.p-name { font-size:16px; font-weight:bold; color:#1a3a5c; margin-bottom:3px; }
.p-type { font-size:12px; color:#777; margin-bottom:10px; }

.p-reward {
  background:#e8f4f0; border:1px solid #7ecfb5;
  border-radius:8px; padding:9px 10px; margin-bottom:9px;
}
.p-reward b { display:block; color:#1a6b50; font-size:13px; margin-bottom:3px; }
.p-reward span { color:#2a8060; font-size:13px; }

.p-links a {
  display:block; background:#1a3a5c; color:#fff; text-decoration:none;
  text-align:center; border-radius:8px; padding:8px; font-size:12px; margin-top:6px;
}

.p-badge {
  font-size:11px; background:#fff4e0; border:1px solid #e8c96c;
  border-radius:6px; padding:6px 8px; color:#8a5c00; margin-top:8px;
}

.maplibregl-popup-content {
  border-radius:12px !important;
  box-shadow:0 4px 16px rgba(0,0,0,0.18) !important;
  border:1px solid #d0c8b0 !important;
  padding:16px !important;
}

#legend {
  position:fixed; bottom:20px; left:12px; z-index:100;
  background:rgba(255,255,255,0.96); border:1px solid #d0c8b0;
  border-radius:10px; padding:10px 14px; font-size:12px; color:#444;
}
#legend b { display:block; margin-bottom:7px; color:#1a3a5c; font-size:13px; }
.lr { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.ld { width:13px; height:13px; border-radius:50%; border:2px solid #fff; }

@media(max-width:700px) {
  #map { top:126px; }
  .h-sub { display:none; }
}
</style>
</head>

<body>

<div id="header">
  <div class="header-top">
    <span class="h-paw">🐾</span>
    <span class="h-title">Waggly Tails — The Map</span>
    <span class="h-sub">Discover pet-friendly rewards</span>
    <span class="h-pill" id="venueCount">Loading...</span>
  </div>

  <div id="controls">
    <input id="searchBox" type="text" placeholder="Search venues...">
    <button class="filter-btn active" data-filter="All">All</button>
    <button class="filter-btn" data-filter="Cafe">Cafes</button>
    <button class="filter-btn" data-filter="Pub">Pubs</button>
    <button class="filter-btn" data-filter="Restaurant">Restaurants</button>
    <button class="filter-btn" data-filter="Shop">Shops</button>
    <button class="filter-btn" data-filter="Accommodation">Accommodation</button>
    <button class="filter-btn" data-filter="Featured">Featured</button>
    <button class="filter-btn" id="nearMeBtn">Near Me</button>
  </div>
</div>

<div id="map"></div>

<div id="legend">
  <b>Map Key</b>
  <div class="lr"><div class="ld" style="background:#1a3a5c;"></div>Featured venue</div>
  <div class="lr"><div class="ld" style="background:#3d8bbd;"></div>Listed venue</div>
</div>

<script>
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1uZBCC_1X-zdLeyW10Bw_E5N63fToD-dv3PcwjfhQHX4/gviz/tq?tqx=out:csv&sheet=Sheet1";

let venues = [];
let markers = [];
let activeFilter = "All";
let searchTerm = "";
let userLocationMarker = null;

const map = new maplibregl.Map({
  container: "map",
  style: "https://api.protomaps.com/styles/v4/light/en.json?key=d8a0fbbaf70fb776",
  center: [-0.1500, 50.8290],
  zoom: 12,
  minZoom: 5,
  maxZoom: 19,
  attributionControl: true
});

map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");

function clean(value) {
  return value ? String(value).trim() : "";
}

function isYes(value) {
  return ["yes", "true", "1", "y"].includes(clean(value).toLowerCase());
}

function splitCSVLine(line) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"' && line[i + 1] === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function csvToObjects(csv) {
  const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "");
  const headers = splitCSVLine(lines[0]).map(h => h.trim());

  return lines.slice(1).map(line => {
    const values = splitCSVLine(line);
    let obj = {};
    headers.forEach((header, i) => {
      obj[header] = values[i] || "";
    });
    return obj;
  });
}

function normaliseVenue(row) {
  return {
    name: clean(row.Name),
    type: clean(row.Type),
    area: clean(row.Area),
    address: clean(row.Address),
    lat: parseFloat(row.Latitude),
    lng: parseFloat(row.Longitude),
    reward: clean(row.Reward),
    website: clean(row.Website),
    instagram: clean(row.Instagram),
    featured: isYes(row.Featured),
    webOnly: isYes(row["Web Only"]),
    status: clean(row.Status),
    partnerStatus: clean(row["Partner Status"])
  };
}

async function loadVenues() {
  try {
    const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cachebust=" + Date.now());
    const csv = await response.text();

    venues = csvToObjects(csv)
      .map(normaliseVenue)
      .filter(v =>
        v.name &&
        v.status &&
        v.status.toLowerCase() === "live"
      );

    renderMarkers();
  } catch (error) {
    console.error("Could not load venue sheet:", error);
    document.getElementById("venueCount").textContent = "Sheet error";
  }
}

function renderMarkers() {
  markers.forEach(marker => marker.remove());
  markers = [];

  const visibleVenues = venues.filter(v => {
    const text = `${v.name} ${v.type} ${v.area} ${v.address}`.toLowerCase();
    const matchesSearch = text.includes(searchTerm);

    const matchesFilter =
      activeFilter === "All" ||
      v.type.toLowerCase().includes(activeFilter.toLowerCase()) ||
      (activeFilter === "Featured" && v.featured);

    return matchesSearch && matchesFilter;
  });

  visibleVenues.forEach(v => {
    if (v.webOnly || isNaN(v.lat) || isNaN(v.lng)) return;

    const el = document.createElement("div");
    el.className = "pin-el " + (v.featured ? "pin-featured" : "pin-standard");
    el.innerHTML = "🐾" + (v.featured ? '<div class="pin-star">★</div>' : "");

    const popup = new maplibregl.Popup({ offset:22, maxWidth:"280px" })
      .setHTML(createPopupHTML(v));

    const marker = new maplibregl.Marker({ element:el })
      .setLngLat([v.lng, v.lat])
      .setPopup(popup)
      .addTo(map);

    markers.push(marker);
  });

  document.getElementById("venueCount").textContent =
    markers.length + " venues live";
}

function createPopupHTML(v) {
  const websiteLink = v.website
    ? `<a href="${escapeHTML(v.website)}" target="_blank" rel="noopener">Visit Venue Website</a>`
    : "";

  const instagramLink = v.instagram
    ? `<a href="${escapeHTML(v.instagram)}" target="_blank" rel="noopener">View Instagram</a>`
    : "";

  const badge = v.featured
    ? `<div class="p-badge">⭐ Featured Waggly Tails venue</div>`
    : `<div class="p-badge">📍 Listed Waggly Tails venue</div>`;

  return `
    <div class="wt-popup">
      <div class="p-name">${escapeHTML(v.name)}</div>
      <div class="p-type">${escapeHTML(v.type)}${v.area ? " — " + escapeHTML(v.area) : ""}</div>

      <div class="p-reward">
        <b>Reward</b>
        <span>${escapeHTML(v.reward || "Venue discount / offer to confirm")}</span>
      </div>

      <div class="p-links">
        ${websiteLink}
        ${instagramLink}
      </div>

      ${badge}
    </div>
  `;
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

document.querySelectorAll(".filter-btn[data-filter]").forEach(button => {
  button.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
    this.classList.add("active");
    activeFilter = this.dataset.filter;
    renderMarkers();
  });
});

document.getElementById("searchBox").addEventListener("input", function() {
  searchTerm = this.value.toLowerCase().trim();
  renderMarkers();
});

document.getElementById("nearMeBtn").addEventListener("click", function() {
  if (!navigator.geolocation) {
    alert("Your browser does not support location.");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    const userLng = position.coords.longitude;
    const userLat = position.coords.latitude;

    map.flyTo({
      center: [userLng, userLat],
      zoom: 15
    });

    if (userLocationMarker) {
      userLocationMarker.remove();
    }

    userLocationMarker = new maplibregl.Marker({ color:"#e8a020" })
      .setLngLat([userLng, userLat])
      .setPopup(new maplibregl.Popup().setHTML("<b>You are here</b>"))
      .addTo(map);
  }, function() {
    alert("Location permission was not allowed.");
  });
});

map.on("load", loadVenues);
</script>

</body>
</html>
